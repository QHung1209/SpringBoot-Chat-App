spring.application.name=mcxx-chat

# ===== Server =====
server.port=8080

# ===== PostgreSQL (datasource) =====
# Sua ten DB / user / pass cho khop voi Postgres tren may ban.
# Pass doc tu bien moi truong DB_PASSWORD, neu khong co thi mac dinh la 'postgres'.
spring.datasource.url=jdbc:postgresql://localhost:5432/mcxx_chat
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# validate = Hibernate CHI kiem tra entity co khop schema khong, KHONG tu sua bang.
# Schema do Flyway quan ly (xem ben duoi). Day la cau hinh dung cho du an that.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Bat log cau SQL ra console (tien hoc, tat di khi len production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Flyway (quan ly schema bang file migration) =====
# Mac dinh Flyway tu doc cac file trong: src/main/resources/db/migration/
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=${REDIS_PASSWORD:}

# ===== Logging (tien khi hoc) =====
logging.level.org.springframework.security=DEBUG


